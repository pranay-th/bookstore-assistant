name: Assistant Deploy

# Only runs on push to main.
# The assistant is stateless (no DB / migrations) — this just triggers Render.

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # TODO: Add RENDER_DEPLOY_HOOK_URL in GitHub → Settings → Secrets → Actions.
      - name: Trigger Render deploy
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
          else
            echo "RENDER_DEPLOY_HOOK_URL not set — skipping deploy trigger"
          fi
