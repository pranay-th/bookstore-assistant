services:
  - type: web
    name: bookstore-assistant
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "False"
      - key: LLM_API_KEY
        sync: false
      - key: LLM_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: LLM_MODEL
        value: deepseek/deepseek-v3.2
      - key: LLM_MAX_TOKENS
        value: "1024"
      - key: AGENT_MAX_ITERATIONS
        value: "4"
      - key: DJANGO_API_URL
        sync: false
      - key: ANALYTICS_SERVICE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      # Auth — JWT_SECRET MUST equal the Django backend's SECRET_KEY so this
      # service can verify the access tokens it issues.
      - key: JWT_SECRET
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_USER_ID_CLAIM
        value: user_id
      - key: REQUIRE_AUTH
        value: "True"
    healthCheckPath: /health
