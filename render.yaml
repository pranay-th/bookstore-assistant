services:
  - type: web
    name: bookstore-assistant
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "False"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: AGENT_MAX_ITERATIONS
        value: "6"
      - key: DJANGO_API_URL
        sync: false
      - key: ANALYTICS_SERVICE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
    healthCheckPath: /health
